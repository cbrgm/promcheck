---
name: release-notification

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  notify-on-release:
    runs-on: ubuntu-latest
    steps:
      - name: Send Telegram Notification on new release
        uses: cbrgm/telegram-github-action@bd85ecf48b5b5c48b033a5ade308ac31a2b4e79a # v1.4.0
        with:
          token: ${{ secrets.TELEGRAM_TOKEN }}
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          message: |
            🚀 New Release Published!
            Release Name: ${{ github.event.release.name }}
            Tag: ${{ github.event.release.tag_name }}
            Actor: ${{ github.actor }}
            Repository: ${{ github.repository }}
            Check it out: ${{ github.event.release.html_url }}

      - name: Send Mastodon Status on new release
        id: mastodon
        uses: cbrgm/mastodon-github-action@776364a15dd1171530479600c75363f7cbc89ef5 # v2.2.0
        if: ${{ !github.event.repository.private }}
        with:
          access-token: ${{ secrets.MASTODON_ACCESS_TOKEN }}
          url: ${{ secrets.MASTODON_URL }}
          language: "en"
          message: |
            🚀  ${{ github.repository }} ${{ github.event.release.name }} published!
            Check it out: ${{ github.event.release.html_url }}
...
